{{- if eq .Values.agent.mode "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zensu-agent.fullname" . }}
  labels:
    {{- include "zensu-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zensu-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zensu-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zensu-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "zensu-agent.fullname" . }}
            - secretRef:
                name: {{ include "zensu-agent.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
